<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <title>Portfolio - calculator</title>
  </head>
  <body class="bg-dark text-light">
    <div class="container w-50 pt-5">
      <h1>Calculator</h1>
      <input type="number" class="form-control mb-2" placeholder="Enter first number" id="input1" value="" />

      <input type="number" class="form-control mb-2" placeholder="Enter second number" id="input2" value="" />
      <div class="d-flex mb-2">
        <button class="btn btn-success flex-grow-1 mx-2" id="plus">+</button>
        <button class="btn btn-danger flex-grow-1 mx-2" id="minus">-</button>
        <button class="btn btn-primary flex-grow-1 mx-2" id="multiply">*</button>
        <button class="btn btn-info flex-grow-1 mx-2" id="divide">/</button>
      </div>

      <button class="btn btn-outline-info w-100 mb-2" id="submit">Calculate</button>

      <div class="text-bg-light p-3 text-center">
        <h4>Result:</h4>
        <p id="result" class="mb-0">0</p>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
